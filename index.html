<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Generation Lab</title>
<style>
body{margin:0;background:#0f0f13;color:#dfe6e9;font-family:Segoe UI,system-ui,sans-serif}header{background:#1a1a24;border-bottom:1px solid #333348;padding:8px 16px;display:flex;align-items:center;gap:12px}h1{font-size:16px;color:#a29bfe}.server-status{margin-left:auto;display:flex;gap:6px}.status-dot{width:8px;height:8px;border-radius:50%;background:#ff6b6b}.status-dot.connected{background:#00b894}.status-dot.connecting{background:#fdcb6e}#serverUrl{background:#242436;border:1px solid #333348;color:#dfe6e9;padding:4px 8px;border-radius:8px;width:200px}.btn{padding:5px 12px;border:0;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}.btn-primary{background:#6c5ce7;color:#fff}.btn-accent{background:#00cec9;color:#000}.btn-danger{background:#ff6b6b;color:#fff}.btn-sm{padding:3px 8px;font-size:11px}.btn:disabled{opacity:.4}main{height:calc(100vh - 84px);display:grid;grid-template-columns:260px 1fr 300px}.panel-left,.panel-right{background:#1a1a24;padding:12px;overflow:auto}.panel-center{display:flex;flex-direction:column;min-width:0}.panel-section{background:#242436;border-radius:8px;padding:10px;margin-bottom:12px}.panel-section h3{font-size:12px;color:#8b93a7}.prompt-area{padding:12px;border-bottom:1px solid #333348}.prompt-area textarea{width:100%;background:#242436;border:1px solid #333348;color:#dfe6e9;border-radius:8px;padding:8px;margin-bottom:8px}.action-row{display:flex;gap:8px}.gallery{flex:1;padding:12px;overflow:auto}.gallery img{max-width:31%;margin:4px;border-radius:4px}.log-area{height:100px;background:#1a1a24;border-top:1px solid #333348;padding:8px;color:#8b93a7;font:11px Consolas;white-space:pre-wrap;overflow:auto}.upload-zone{border:2px dashed #333348;border-radius:8px;padding:14px;text-align:center;color:#8b93a7}.upload-zone input{display:none}.ctrl{display:flex;flex-direction:column;font-size:11px;color:#8b93a7;margin-bottom:6px}.ctrl input,.ctrl select{background:#242436;border:1px solid #333348;color:#dfe6e9;border-radius:4px;padding:4px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.profiles{display:flex;gap:4px}.profiles .btn{flex:1}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}.modal-overlay.show{display:flex}.modal{background:#1a1a24;border:1px solid #333348;border-radius:12px;padding:20px;width:600px}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}footer{height:28px;text-align:center;color:#8b93a7;font-size:10px;background:#1a1a24;border-top:1px solid #333348;padding-top:6px}
</style>
</head>
<body>
<header><h1>Media Generation Lab</h1><div class="server-status"><div class="status-dot" id="statusDot"></div><span id="statusText">Disconnected</span></div><input id="serverUrl" value="http://127.0.0.1:8188"><button class="btn btn-primary" id="btnConnect" onclick="connectServer()">Connect</button><button class="btn btn-sm" onclick="showAdvancedDialog()">Advanced</button></header>
<main><div class="panel-left"><div class="panel-section"><h3>Genre Presets</h3><div id="genreList"></div></div><div class="panel-section"><h3>Character Reference</h3><div class="upload-zone" onclick="document.getElementById('fileChar').click()"><input type="file" id="fileChar" accept="image/*" onchange="handleUpload(this,'char')"><div id="previewChar">Click or drag image</div></div></div><div class="panel-section"><h3>Pose Reference</h3><div class="upload-zone" onclick="document.getElementById('filePose').click()"><input type="file" id="filePose" accept="image/*" onchange="handleUpload(this,'pose')"><div id="previewPose">Click or drag image</div></div></div><div class="panel-section"><h3>Saved Presets</h3><div id="presetList"></div><button class="btn btn-sm btn-primary" onclick="saveCurrentPreset()">Save Current</button></div></div><div class="panel-center"><div class="prompt-area"><textarea id="positivePrompt" rows="3" placeholder="Positive prompt..."></textarea><textarea id="negativePrompt" rows="2">(low quality, worst quality:1.4), blurry, bad anatomy, extra limbs, extra fingers, poorly drawn hands, watermark</textarea><div class="action-row"><button class="btn btn-accent" id="btnGenerate" onclick="generate()" disabled>Generate</button><button class="btn btn-danger btn-sm" id="btnInterrupt" onclick="interrupt()" disabled>Stop</button><span id="genInfo"></span></div></div><div class="gallery" id="gallery"></div><div class="log-area" id="logArea"></div></div><div class="panel-right"><div class="panel-section"><h3>Quick Profile</h3><div class="profiles"><button class="btn btn-sm" onclick="applyProfile('quality')">Quality</button><button class="btn btn-sm" onclick="applyProfile('balanced')">Balanced</button><button class="btn btn-sm" onclick="applyProfile('speed')">Speed</button></div></div><div class="panel-section"><h3>Models</h3><label class="ctrl">Checkpoint<select id="selCheckpoint"></select></label><label class="ctrl">ControlNet<select id="selControlnet"></select></label><label class="ctrl">IPAdapter<select id="selIpadapter"></select></label><label class="ctrl">CLIP Vision<select id="selClipvision"></select></label></div><div class="panel-section"><h3>Resolution</h3><div class="row2"><label class="ctrl">W<input id="inWidth" type="number" value="512"></label><label class="ctrl">H<input id="inHeight" type="number" value="768"></label></div></div><div class="panel-section"><h3>KSampler</h3><label class="ctrl">Steps<input id="inSteps" type="range" min="5" max="50" value="25"></label><label class="ctrl">CFG<input id="inCfg" type="range" min="1" max="15" value="7" step="0.5"></label><div class="row2"><label class="ctrl">Sampler<select id="selSampler"><option>dpmpp_2m</option><option>euler</option></select></label><label class="ctrl">Scheduler<select id="selScheduler"><option>karras</option><option>normal</option></select></label></div><label class="ctrl">Seed<input id="inSeed" type="number" value="-1"></label></div></div></main>
<div class="modal-overlay" id="advancedModal"><div class="modal"><h2>Advanced Settings</h2><div class="modal-grid" id="advancedGrid"></div><div><button class="btn btn-sm" onclick="closeAdvancedDialog()">Close</button><button class="btn btn-sm btn-primary" onclick="applyAdvancedSettings()">Apply</button></div></div></div>
<footer>Media Generation Lab v2.4 Production Movie Builder</footer>
<script src="hotfix.js"></script>
<script src="ref_fix.js"></script>
<script src="model_guard.js"></script>
<script src="production.js"></script>
</body>
</html>
